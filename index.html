<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Oyunlu Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
      color: #fff;
      text-align: center;
    }
    header {
      padding: 20px;
      background: rgba(0,0,0,0.5);
      font-size: 24px;
      font-weight: bold;
    }
    nav {
      margin: 20px;
    }
    nav button {
      margin: 5px;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background: #ff9800;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
    }
    nav button:hover {
      background: #e68900;
    }
    #gameArea {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 20px;
    }
    canvas {
      background: #111;
      border: 2px solid #fff;
    }
    #scoreBoard {
      margin-top: 20px;
      font-size: 20px;
    }
    footer {
      margin-top: 40px;
      padding: 10px;
      background: rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <header>🎮 Oyunlu Site 🎮</header>
  <nav>
    <button onclick="startGame()">Oyunu Başlat</button>
    <button onclick="resetGame()">Sıfırla</button>
  </nav>
  <div id="gameArea">
    <canvas id="gameCanvas" width="600" height="400"></canvas>
  </div>
  <div id="scoreBoard">Skor: <span id="score">0</span></div>
  <footer>© 2026 Senin Oyunlu Siten</footer>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    let score = 0;
    let ball = { x: 300, y: 200, radius: 15, dx: 4, dy: 3 };

    function drawBall() {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fillStyle = "#ff9800";
      ctx.fill();
      ctx.closePath();
    }

    function update() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBall();
      ball.x += ball.dx;
      ball.y += ball.dy;

      // Kenarlardan sekme
      if(ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
        ball.dx *= -1;
        score++;
      }
      if(ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
        ball.dy *= -1;
        score++;
      }

      document.getElementById("score").textContent = score;
      requestAnimationFrame(update);
    }

    function startGame() {
      score = 0;
      ball.x = 300;
      ball.y = 200;
      update();
    }

    function resetGame() {
      score = 0;
      ball.x = 300;
      ball.y = 200;
      document.getElementById("score").textContent = score;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  </script>
</body>
</html>
